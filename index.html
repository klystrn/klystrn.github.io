<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reginald Tan · Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script type="text/javascript">
      // Counterpart to public/404.html's redirect: decode the real path back
      // out of the query string and restore it via history.replaceState
      // before React Router mounts, so a refresh on /tech lands on /tech.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <meta name="description" content="Reginald Tan — software engineering, with a market mind. Singapore. Fintech, tech, and finance." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body data-mode="vanilla">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
