    <meta name="theme-color" content="#07090d" media="(prefers-color-scheme: dark)" />
    <link rel="canonical" href="https://klystrn.github.io/" />
    <script type="text/javascript">
      // Counterpart to public/404.html's redirect: decode the real path back
      // out of the query string and restore it via history.replaceState
      // before React Router mounts, so a refresh on /tech lands on /tech.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <meta name="description" content="Reginald Tan — Singapore software engineer × financial markets. One portfolio, three lenses: an editorial site, an IDE, and a brokerage terminal. Open to finance, tech, and fintech roles." />
